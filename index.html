<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ThingSpeak LED Kontrolü</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container { 
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 32px;
        }
        
        .led-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .led-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .led-card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        
        .led-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .led-button {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            border: none;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        /* LED AÇIK (0 = Açık/Yanıyor) - YEŞİL */
        .led-on {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.8);
        }
        
        .led-on::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.3), transparent);
            animation: pulse 2s infinite;
        }
        
        /* LED KAPAL (1 = Kapalı/Söndü) - KIRMIZI */
        .led-off {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.6);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .led-button:hover:not(:disabled) {
            transform: scale(1.08);
        }
        
        .led-button:active:not(:disabled) {
            transform: scale(0.95);
        }
        
        .led-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .led-label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .led-time {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        
        .led-loading {
            font-size: 12px;
            color: #667eea;
            margin-top: 8px;
            font-weight: bold;
            height: 16px;
        }
        
        /* ✅ Uyarı mesajı stili */
        .led-warning {
            font-size: 12px;
            color: white;
            background: #ff9800;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
            font-weight: bold;
            animation: slideDown 0.3s ease;
        }
        
        .led-warning-hidden {
            display: none;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ✅ Geri sayım stili */
        .countdown {
            font-size: 11px;
            color: #fff;
            background: #f44336;
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 6px;
            font-weight: bold;
        }
        
        .footer {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #e9ecef;
            color: #999;
            font-size: 14px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: blink 2s infinite;
            margin-right: 5px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
