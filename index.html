<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ThingSpeak Veri Çekme</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f4; }
        .data-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 300px; }
        h3 { margin-top: 0; color: #333; }
        .value { font-size: 24px; font-weight: bold; color: #0275d8; }
        .time { font-size: 12px; color: #777; margin-top: 10px; }
        .debug { font-size: 12px; color: #d32f2f; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="data-card">
        <h3>Sıcaklık Değeri (Field 1)</h3>
        <div id="veri-kutusu" class="value">Yükleniyor...</div>
        <div id="zaman-kutusu" class="time"></div>
        <div id="debug-kutusu" class="debug"></div>
    </div>

    <script>
        const channelId = "3047398"; 
        const readApiKey = "0YNSMCTFZF3IICX2";
        
        // CORS sorunu yok, önceden kaydedilmiş verileri döndürür
        const url = `https://thingspeak.com/channels/${channelId}/fields/1/last.json?api_key=${readApiKey}`;

        function veriCek() {
            fetch(url, {
                method: 'GET',
                headers: {
                    'Accept': 'application/json'
                }
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP Hatası: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if(data.field1 !== null && data.field1 !== undefined) {
                        document.getElementById("veri-kutusu").innerText = data.field1 + " °C";
                        const tarih = new Date(data.created_at).toLocaleString("tr-TR");
                        document.getElementById("zaman-kutusu").innerText = "Son Güncelleme: " + tarih;
                        document.getElementById("debug-kutusu").innerText = "";
                    } else {
                        document.getElementById("veri-kutusu").innerText = "Veri yok";
                    }
                })
                .catch(error => {
                    console.error("Hata:", error);
                    document.getElementById("veri-kutusu").innerText = "Hata!";
                    document.getElementById("debug-kutusu").innerText = "CORS Sorunu - Proxy kullanılıyor...";
                    
                    // CORS sorunu varsa alternatif yol
                    veriCekProxy();
                });
        }

        function veriCekProxy() {
            // CORS proxy kullanarak
            const proxyUrl = `https://cors-anywhere.herokuapp.com/${url}`;
            
            fetch(proxyUrl)
                .then(response => response.json())
                .then(data => {
                    if(data.field1 !== null) {
                        document.getElementById("veri-kutusu").innerText = data.field1 + " °C";
                        const tarih = new Date(data.created_at).toLocaleString("tr-TR");
                        document.getElementById("zaman-kutusu").innerText = "Son Güncelleme: " + tarih;
                    }
                })
                .catch(error => console.error("Proxy Hatası:", error));
        }

        veriCek();
        setInterval(veriCek, 15000);
    </script>

</body>
</html>
