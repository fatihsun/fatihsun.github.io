<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThingSpeak LED Kontrolü1 Gerisayım</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 32px;
        }
        
        .led-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .led-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            border: 2px solid #e9ecef;
        }
        
        .led-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .led-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .led-button {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: white;
        }
        
        .led-on {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.8);
        }
        
        .led-off {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.6);
        }
        
        .led-button:hover:not(:disabled) {
            transform: scale(1.08);
        }
        
        .led-button:active:not(:disabled) {
            transform: scale(0.95);
        }
        
        .led-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .time-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 15px;
            font-size: 12px;
        }
        
        .time-input-group input {
            width: 80px;
            padding: 6px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .time-input-group label {
            color: #333;
            font-weight: bold;
        }
        
        .led-label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .led-time {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        
        .led-loading {
            font-size: 12px;
            color: #667eea;
            margin-top: 8px;
            font-weight: bold;
            height: 16px;
        }
        
        .led-timer {
            font-size: 14px;
            color: white;
            background: #2196F3;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }
        
        .led-timer.show {
            display: block;
        }
        
        .led-warning {
            font-size: 12px;
            color: white;
            background: #ff9800;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }
        
        .led-warning.show {
            display: block;
        }
        
        .led-countdown {
            font-size: 11px;
            color: white;
            background: #f44336;
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 6px;
            font-weight: bold;
            display: none;
        }
        
        .led-countdown.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #e9ecef;
            color: #999;
            font-size: 14px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: blink 2s infinite;
            margin-right: 5px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 LED Kontrolü</h1>
        
        <div class="led-grid">
            <div class="led-card">
                <h3>LED 1</h3>
                
                <div class="time-input-group">
                    <label>Süre (sn):</label>
                    <input type="number" id="led1-time-input" placeholder="1800" value="1800" min="1">
                </div>
                
                <div class="led-label" id="led1-label">-</div>
                <button class="led-button led-off" id="led1-btn" onclick="toggleLed(1)">-</button>
                <div id="led1-time" class="led-time">-</div>
                <div id="led1-loading" class="led-loading"></div>
                <div id="led1-timer" class="led-timer"></div>
                <div id="led1-warning" class="led-warning"></div>
                <div id="led1-countdown" class="led-countdown"></div>
            </div>

            <div class="led-card">
                <h3>LED 2</h3>
                
                <div class="time-input-group">
                    <label>Süre (sn):</label>
                    <input type="number" id="led2-time-input" placeholder="1800" value="1800" min="1">
                </div>
                
                <div class="led-label" id="led2-label">-</div>
                <button class="led-button led-off" id="led2-btn" onclick="toggleLed(2)">-</button>
                <div id="led2-time" class="led-time">-</div>
                <div id="led2-loading" class="led-loading"></div>
                <div id="led2-timer" class="led-timer"></div>
                <div id="led2-warning" class="led-warning"></div>
                <div id="led2-countdown" class="led-countdown"></div>
            </div>

            <div class="led-card">
                <h3>LED 3</h3>
                
                <div class="time-input-group">
                    <label>Süre (sn):</label>
                    <input type="number" id="led3-time-input" placeholder="1800" value="1800" min="1">
                </div>
                
                <div class="led-label" id="led3-label">-</div>
                <button class="led-button led-off" id="led3-btn" onclick="toggleLed(3)">-</button>
                <div id="led3-time" class="led-time">-</div>
                <div id="led3-loading" class="led-loading"></div>
                <div id="led3-timer" class="led-timer"></div>
                <div id="led3-warning" class="led-warning"></div>
                <div id="led3-countdown" class="led-countdown"></div>
            </div>
        </div>

        <div class="footer">
            <span class="status-indicator"></span>
            <span id="refresh-status">Yükleniyor...</span>
        </div>
    </div>

    <script>
        const channelId = "3047398";
        const readApiKey = "0YNSMCTFZF3IICX2";
        const writeApiKey = "V2IY1U93VOH2AKCB";
        const RATE_LIMIT = 15000;
        
        let ledStates = { 1: 0, 2: 0, 3: 0 };
        let lastRequestTime = { 1: 0, 2: 0, 3: 0 };
        let countdownInterval = { 1: null, 2: null, 3: null };
        let timerInterval = { 1: null, 2: null, 3: null };
        let timerActive = { 1: false, 2: false, 3: false };
        let timerRemaining = { 1: 0, 2: 0, 3: 0 };
        let isProcessing = { 1: false, 2: false, 3: false };

        function getLedClass(value) {
            return (value == 0 || value == "0") ? "led-on" : "led-off";
        }

        function getLedLabel(value) {
            return (value == 0 || value == "0") ? "💡 AÇIK" : "⚫ KAPALI";
        }

        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) {
                return `${hours}s ${minutes}d ${secs}sn`;
            } else if (minutes > 0) {
                return `${minutes}d ${secs}sn`;
            } else {
                return `${secs}sn`;
            }
        }

        function startTimer(fieldNum, seconds) {
            // ✅ Önceki timer'ı temizle
            if (timerInterval[fieldNum]) {
                clearInterval(timerInterval[fieldNum]);
            }
            
            timerRemaining[fieldNum] = seconds;
            timerActive[fieldNum] = true;
            const timerEl = document.getElementById(`led${fieldNum}-timer`);
            
            timerEl.innerText = `⏱️ ${formatTime(timerRemaining[fieldNum])}`;
            timerEl.classList.add("show");
            
            timerInterval[fieldNum] = setInterval(() => {
                timerRemaining[fieldNum]--;
                timerEl.innerText = `⏱️ ${formatTime(timerRemaining[fieldNum])}`;
                
                if (timerRemaining[fieldNum] <= 0) {
                    clearInterval(timerInterval[fieldNum]);
                    timerActive[fieldNum] = false;
                    timerEl.classList.remove("show");
                    
                    // ✅ Süre bittiğinde durumu tersine çevir
                    const newState = ledStates[fieldNum] == 0 || ledStates[fieldNum] == "0" ? 1 : 0;
                    applyStateChange(fieldNum, newState);
                }
            }, 1000);
        }

        function stopTimer(fieldNum) {
            if (timerInterval[fieldNum]) {
                clearInterval(timerInterval[fieldNum]);
            }
            timerActive[fieldNum] = false;
            document.getElementById(`led${fieldNum}-timer`).classList.remove("show");
        }

        function showCountdown(fieldNum) {
            const warningEl = document.getElementById(`led${fieldNum}-warning`);
            const countdownEl = document.getElementById(`led${fieldNum}-countdown`);
            
            warningEl.innerText = "⏳ Çok hızlı! Lütfen bekleyin...";
            warningEl.classList.add("show");
            countdownEl.classList.add("show");
            
            let remaining = Math.ceil(RATE_LIMIT / 1000);
            
            if (countdownInterval[fieldNum]) {
                clearInterval(countdownInterval[fieldNum]);
            }
            
            countdownEl.innerText = `${remaining}s sonra tekrar deneyebilirsin`;
            
            countdownInterval[fieldNum] = setInterval(() => {
                remaining--;
                if (remaining > 0) {
                    countdownEl.innerText = `${remaining}s sonra tekrar deneyebilirsin`;
                } else {
                    clearInterval(countdownInterval[fieldNum]);
                    warningEl.classList.remove("show");
                    countdownEl.classList.remove("show");
                    veriCek();
                }
            }, 1000);
        }

        async function veriCek() {
            try {
                const response = await fetch(
                    `https://api.thingspeak.com/channels/${channelId}/feeds/last.json?api_key=${readApiKey}`
                );
                
                if (response.ok) {
                    const data = await response.json();
                    
                    for (let i = 1; i <= 3; i++) {
                        const durum = String(data[`field${i}`] || "0").trim();
                        ledStates[i] = durum;
                        
                        const statusClass = getLedClass(durum);
                        const label = getLedLabel(durum);
                        
                        document.getElementById(`led${i}-btn`).innerText = durum;
                        document.getElementById(`led${i}-btn`).className = `led-button ${statusClass}`;
                        document.getElementById(`led${i}-label`).innerText = label;
                        
                        const tarih = new Date(data.created_at).toLocaleString("tr-TR");
                        document.getElementById(`led${i}-time`).innerText = tarih;
                    }
                }
            } catch (error) {
                console.error('Hata:', error);
            }
            
            document.getElementById("refresh-status").innerText = "Güncellendi: " + new Date().toLocaleTimeString("tr-TR");
        }

        async function applyStateChange(fieldNum, newState) {
            let field1 = ledStates[1];
            let field2 = ledStates[2];
            let field3 = ledStates[3];
            
            if (fieldNum === 1) field1 = newState;
            if (fieldNum === 2) field2 = newState;
            if (fieldNum === 3) field3 = newState;
            
            try {
                const response = await fetch('https://api.thingspeak.com/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `api_key=${writeApiKey}&field1=${field1}&field2=${field2}&field3=${field3}`
                });
                
                const result = await response.text();
                console.log('Otomatik değişiklik yapıldı:', result);
                
                if (result > 0) {
                    setTimeout(() => {
                        veriCek();
                    }, 1000);
                }
            } catch (error) {
                console.error('Otomatik değişiklik hatası:', error);
            }
        }

        async function toggleLed(fieldNum) {
            if (isProcessing[fieldNum]) {
                return;
            }
            
            const now = Date.now();
            const timeSinceLastRequest = now - lastRequestTime[fieldNum];
            
            if (timeSinceLastRequest < RATE_LIMIT) {
                showCountdown(fieldNum);
                return;
            }
            
            const btn = document.getElementById(`led${fieldNum}-btn`);
            const loading = document.getElementById(`led${fieldNum}-loading`);
            const warningEl = document.getElementById(`led${fieldNum}-warning`);
            const countdownEl = document.getElementById(`led${fieldNum}-countdown`);
            const timeInput = document.getElementById(`led${fieldNum}-time-input`);
            
            warningEl.classList.remove("show");
            countdownEl.classList.remove("show");
            
            const newState = ledStates[fieldNum] == 0 || ledStates[fieldNum] == "0" ? 1 : 0;
            
            let field1 = ledStates[1];
            let field2 = ledStates[2];
            let field3 = ledStates[3];
            
            if (fieldNum === 1) field1 = newState;
            if (fieldNum === 2) field2 = newState;
            if (fieldNum === 3) field3 = newState;
            
            loading.innerText = "Gönderiliyor...";
            btn.disabled = true;
            isProcessing[fieldNum] = true;
            
            try {
                const response = await fetch('https://api.thingspeak.com/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `api_key=${writeApiKey}&field1=${field1}&field2=${field2}&field3=${field3}`
                });
                
                const result = await response.text();
                
                if (result > 0) {
                    loading.innerText = "✓ Başarılı";
                    lastRequestTime[fieldNum] = Date.now();
                    
                    // ✅ Timer başlat
                    const seconds = parseInt(timeInput.value) || 1800;
                    startTimer(fieldNum, seconds);
                    
                    setTimeout(() => {
                        veriCek();
                        loading.innerText = "";
                        btn.disabled = false;
                        isProcessing[fieldNum] = false;
                    }, 2000);
                } else {
                    loading.innerText = "✗ Hata!";
                    setTimeout(() => {
                        loading.innerText = "";
                        btn.disabled = false;
                        isProcessing[fieldNum] = false;
                    }, 1500);
                }
            } catch (error) {
                console.error('Hata:', error);
                loading.innerText = "✗ Hata!";
                setTimeout(() => {
                    loading.innerText = "";
                    btn.disabled = false;
                    isProcessing[fieldNum] = false;
                }, 1500);
            }
        }

        veriCek();
        setInterval(veriCek, 30000);
    </script>
</body>
</html>
