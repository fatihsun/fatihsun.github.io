<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThingSpeak LED Kontrolü1 Gerisayım</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 32px;
        }
        
        .led-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .led-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            border: 2px solid #e9ecef;
        }
        
        .led-card h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
        }
        
        .led-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .led-button {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: white;
        }
        
        .led-on {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            box-shadow: 0 0 40px rgba(76, 175, 80, 0.8);
        }
        
        .led-off {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.6);
        }
        
        .led-button:hover:not(:disabled) {
            transform: scale(1.08);
        }
        
        .led-button:active:not(:disabled) {
            transform: scale(0.95);
        }
        
        .led-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .time-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 15px;
            font-size: 12px;
        }
        
        .time-input-group input {
            width: 80px;
            padding: 6px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .time-input-group label {
            color: #333;
            font-weight: bold;
        }
        
        .led-label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .led-time {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
        
        .led-loading {
            font-size: 12px;
            color: #667eea;
            margin-top: 8px;
            font-weight: bold;
            height: 16px;
        }
        
        .led-timer {
            font-size: 14px;
            color: white;
            background: #2196F3;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }
        
        .led-timer.show {
            display: block;
        }
        
        .led-warning {
            font-size: 12px;
            color: white;
            background: #ff9800;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
            font-weight: bold;
            display: none;
        }
        
        .led-warning.show {
            display: block;
        }
        
        .led-countdown {
            font-size: 11px;
            color: white;
            background: #f44336;
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 6px;
            font-weight: bold;
            display: none;
        }
        
        .led-countdown.show {
            display: block;
        }
        
        .footer {
            text-align: center;
            padding-top: 30px;
            border-top: 1px solid #e9ecef;
            color: #999;
            font-size: 14px;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: blink 2s infinite;
            margin-right: 5px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 LED Kontrolü</h1>
        
        <div class="led-grid">*
